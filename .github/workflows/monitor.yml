name: 库存监控自动运行
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟执行一次
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 启动库存监控
        run: python monitor.py
        env:
          # 从 GitHub 密钥读取
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_PWD: ${{ secrets.FROM_PWD }}
          TO_PHONE: ${{ secrets.TO_PHONE }}