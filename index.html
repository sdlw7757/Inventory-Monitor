<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页库存监控工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1e1e2e;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #2b2b3d;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            margin-bottom: 15px;
            color: #7dd3fc;
        }
        input, button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin: 5px;
        }
        input {
            background: #3f3f52;
            color: #fff;
            width: 280px;
        }
        button {
            background: #0ea5e9;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background: #0284c7;
        }
        .monitor-item {
            background: #374151;
            padding: 10px;
            border-radius: 5px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-area {
            height: 300px;
            overflow-y: auto;
            background: #111827;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.5;
        }
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .log-warning { color: #f59e0b; }
        .log-info { color: #3b82f6; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📩 短信提醒配置（QQ邮箱 → 免费短信）</h2>
        <input type="text" id="email" placeholder="发件邮箱（QQ邮箱）">
        <input type="password" id="pwd" placeholder="QQ邮箱SMTP授权码">
        <button onclick="saveEmailConfig()">保存配置</button>
        <button onclick="clearEmailConfig()">删除配置</button>
        <div id="emailDisplay" style="margin-top:10px; font-size:14px;"></div>
    </div>

    <div class="card">
        <h2>📱 接收短信手机号</h2>
        <input type="text" id="smsPhone" placeholder="输入接收手机号（如 13561719517）">
        <button onclick="saveSmsPhone()">保存手机号</button>
        <button onclick="clearSmsPhone()">删除手机号</button>
        <div id="phoneDisplay" style="margin-top:10px; font-size:14px;"></div>
    </div>

    <div class="card">
        <h2>📌 添加监控项</h2>
        <input type="text" id="url" placeholder="监控网址" value="">
        <input type="text" id="keyword" placeholder="商品关键词（如 4H-4G-USTJ-002）">
        <input type="number" id="threshold" placeholder="阈值（库存>多少提醒）" value="0">
        <button onclick="addMonitor()">添加监控</button>
    </div>

    <div class="card">
        <h2>🚀 监控控制</h2>
        <button onclick="startMonitor()">启动监控</button>
        <button onclick="stopMonitor()">停止监控</button>
        <button onclick="exportConfig()">导出云端配置（config.json）</button>
    </div>

    <div class="card">
        <h2>📋 监控列表</h2>
        <div id="monitorList"></div>
    </div>

    <div class="card">
        <h2>📜 实时日志</h2>
        <div id="logArea" class="log-area"></div>
    </div>
</div>

<script>
let monitorList = JSON.parse(localStorage.getItem('monitorList') || '[]');
let emailConfig = JSON.parse(localStorage.getItem('emailConfig') || '{"email":"","pwd":""}');
let smsPhone = localStorage.getItem('smsPhone') || '';
let monitorTimer = null;
const COOLDOWN = 1800000;

window.onload = function() {
    renderMonitorList();
    refreshEmailDisplay();
    refreshPhoneDisplay();
};

function refreshEmailDisplay() {
    const show = document.getElementById('emailDisplay');
    if (!emailConfig.email) {
        show.innerHTML = '未设置发件邮箱';
        return;
    }
    const e = emailConfig.email;
    const at = e.indexOf('@');
    const prefix = e.substring(0,3);
    const suffix = e.substring(at-3, at);
    const domain = e.substring(at);
    const masked = `${prefix}****${suffix}${domain}`;
    show.innerHTML = `当前发件邮箱：${masked}`;
}

function refreshPhoneDisplay() {
    const show = document.getElementById('phoneDisplay');
    if (!smsPhone) {
        show.innerHTML = '未设置接收手机号';
        return;
    }
    const masked = smsPhone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3');
    show.innerHTML = `当前接收：${masked}`;
}

function saveSmsPhone() {
    const phone = document.getElementById('smsPhone').value.trim();
    if (!/^1[3-9]\d{9}$/.test(phone)) {
        addLog('❌ 手机号格式不正确', 'error');
        return;
    }
    smsPhone = phone;
    localStorage.setItem('smsPhone', smsPhone);
    document.getElementById('smsPhone').value = '';
    refreshPhoneDisplay();
    addLog('✅ 接收手机号保存成功', 'success');
}

function clearSmsPhone() {
    smsPhone = '';
    localStorage.removeItem('smsPhone');
    refreshPhoneDisplay();
    addLog('🗑️ 已删除接收手机号', 'warning');
}

function saveEmailConfig() {
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('pwd').value;
    if (!email || !pwd) {
        addLog('❌ 请填写完整邮箱和授权码', 'error');
        return;
    }
    emailConfig = { email, pwd };
    localStorage.setItem('emailConfig', JSON.stringify(emailConfig));
    document.getElementById('email').value = '';
    document.getElementById('pwd').value = '';
    refreshEmailDisplay();
    addLog('✅ 邮箱配置保存成功', 'success');
}

function clearEmailConfig() {
    emailConfig = { email: '', pwd: '' };
    localStorage.removeItem('emailConfig');
    refreshEmailDisplay();
    addLog('🗑️ 已删除邮箱配置', 'warning');
}

function addMonitor() {
    const url = document.getElementById('url').value;
    const keyword = document.getElementById('keyword').value;
    const threshold = parseInt(document.getElementById('threshold').value);
    if (!url || !keyword) {
        addLog('❌ 网址和关键词不能为空', 'error');
        return;
    }
    monitorList.push({ url, keyword, threshold, lastAlarmTime: 0 });
    localStorage.setItem('monitorList', JSON.stringify(monitorList));
    renderMonitorList();
    addLog(`✅ 已添加监控：${keyword}`, 'success');
}

function renderMonitorList() {
    const dom = document.getElementById('monitorList');
    dom.innerHTML = '';
    monitorList.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'monitor-item';
        div.innerHTML = `
            <div>${item.keyword} | ${item.url} | 阈值:${item.threshold}</div>
            <button onclick="deleteMonitor(${i})">删除</button>
        `;
        dom.appendChild(div);
    });
}

function deleteMonitor(index) {
    monitorList.splice(index, 1);
    localStorage.setItem('monitorList', JSON.stringify(monitorList));
    renderMonitorList();
    addLog('🗑️ 已删除监控项', 'warning');
}

function startMonitor() {
    if (monitorTimer) clearInterval(monitorTimer);
    addLog('🚀 监控已启动，每5分钟检测一次', 'info');
    checkAll();
    monitorTimer = setInterval(checkAll, 300000);
}

function stopMonitor() {
    clearInterval(monitorTimer);
    monitorTimer = null;
    addLog('🛑 监控已停止', 'warning');
}

function checkAll() {
    if (monitorList.length === 0) {
        addLog('ℹ️ 暂无监控项', 'info');
        return;
    }
    monitorList.forEach(item => checkItem(item));
}

async function checkItem(item) {
    try {
        const proxy = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(item.url);
        const res = await fetch(proxy, {
            headers: { 'User-Agent': 'Mozilla/5.0' }
        });
        const html = await res.text();
        const num = extractStock(html, item.keyword);
        addLog(`✅ ${item.keyword} → 提取库存：${num}`, 'info');
        if (num > item.threshold) {
            triggerAlarm(item, num);
        }
    } catch (e) {
        addLog(`❌ ${item.keyword} → 访问失败：${e.message}`, 'error');
    }
}

function extractStock(html, keyword) {
    try {
        let reg = new RegExp(keyword + '[\\s\\S]*?库存[^\\d]*?(\\d+)', 'i');
        let match = html.match(reg);
        if (match && match[1]) return parseInt(match[1]);

        reg = new RegExp(keyword + '[\\s\\S]*?>(\\d+)<', 'i');
        match = html.match(reg);
        if (match && match[1]) return parseInt(match[1]);
    } catch (e) {}
    return 0;
}

function triggerAlarm(item, num) {
    const now = Date.now();
    if (now - item.lastAlarmTime < COOLDOWN) {
        addLog(`⚠️ ${item.keyword} 库存${num}，冷却中`, 'warning');
        return;
    }
    item.lastAlarmTime = now;
    localStorage.setItem('monitorList', JSON.stringify(monitorList));
    addLog(`🔴 告警！${item.keyword} 有货！库存：${num}`, 'error');
    sendRealSms(item, num);
}

// ====================== 最终统一版短信提示 ======================
function sendRealSms(item, num) {
    if (!smsPhone) {
        addLog('❌ 未设置接收手机号', 'error');
        return;
    }
    const maskPhone = smsPhone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3');
    addLog(`📩 已触发短信通知 → ${maskPhone}`, 'success');
}

function exportConfig() {
    const exportData = monitorList.map(i => ({ url: i.url, keyword: i.keyword, threshold: i.threshold }));
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'config.json';
    a.click();
    addLog('📥 已导出 config.json', 'success');
}

function addLog(text, type) {
    const log = document.getElementById('logArea');
    const time = new Date().toLocaleTimeString();
    const div = document.createElement('div');
    div.className = `log-${type}`;
    div.innerHTML = `[${time}] ${text}`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
